apiVersion: batch/v1
kind: Job

metadata:
name: cpu-matmul

spec:

backoffLimit: 2

template:

metadata:
  labels:
    app: cpu-matmul

spec:

  restartPolicy: Never

  nodeSelector:
    accelerator: cpu

  containers:

  - name: cpu-matmul

    image: pytorch/pytorch:2.3.1-cpu

    command:
    - python
    - /app/matrix_mul.py
    - --size
    - "5000"

    resources:

      requests:
        cpu: "4"
        memory: "4Gi"

      limits:
        cpu: "8"
        memory: "8Gi"
        
